<!-- Static form discovery for Netlify bot. Never linked, just for scanning. -->
<form name="Kontakt" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="Kontakt" />
  <input name="bot-field" />
  <input name="name" />
  <input name="phone" type="tel" />
  <input name="email" type="email" />
  <textarea name="meddelande"></textarea>
</form>

<form name="Omdome" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="Omdome" />
  <input name="bot-field" />
  <input name="name" />
  <textarea name="omdome"></textarea>
</form>
